kind = "web"
previewPath = "/nostress-web/"
title = "NoStress — Site Web"
version = "1.0.0"
id = "artifacts/nostress-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/nostress-web/" ]
localPort = 25266

[services.development]
run = "pnpm --filter @workspace/nostress-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nostress-web", "run", "build" ]
publicDir = "artifacts/nostress-web/build"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25266"
PUBLIC_URL = "/nostress-web"
