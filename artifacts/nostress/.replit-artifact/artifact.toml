kind = "mobile"
previewPath = "/"
title = "NoStress"
version = "1.0.0"
id = "artifacts/nostress"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25147

[services.development]
run = "pnpm --filter @workspace/nostress run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nostress", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/nostress", "run", "serve" ]

[services.env]
PORT = "25147"
BASE_PATH = "/"
