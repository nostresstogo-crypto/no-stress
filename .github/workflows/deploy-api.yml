name: Deploy API to VPS

on:
  push:
    branches: [main]
    paths:
      - "artifacts/api-server/**"
      - "lib/db/**"
      - "lib/api-zod/**"
      - "deploy/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

env:
  VPS_APP_DIR: /var/www/nostress-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @workspace/api-server run typecheck

      - name: Build api-server
        run: pnpm --filter @workspace/api-server run build

      - name: Stage release artifact
        run: |
          set -e
          STAGE="$RUNNER_TEMP/release"
          mkdir -p "$STAGE/drizzle"
          cp -r artifacts/api-server/dist "$STAGE/"
          cp deploy/release-package.json "$STAGE/package.json"
          cp deploy/ecosystem.config.cjs "$STAGE/" 2>/dev/null || true
          cp -r lib/db/. "$STAGE/drizzle/"
          node -e "
            const fs = require('fs');
            const path = '$STAGE/drizzle/package.json';
            const p = JSON.parse(fs.readFileSync(path, 'utf8'));
            p.devDependencies = p.devDependencies || {};
            p.devDependencies['drizzle-kit'] = p.devDependencies['drizzle-kit'] || '^0.31.6';
            p.scripts = p.scripts || {};
            fs.writeFileSync(path, JSON.stringify(p, null, 2));
          "
          tar -C "$STAGE" -czf release.tar.gz .
          ls -lh release.tar.gz

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.VPS_PORT || 22 }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload release to VPS
        env:
          SHA: ${{ github.sha }}
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USER }}
          PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          REMOTE_DIR="$VPS_APP_DIR/releases/$SHA"
          ssh -p "$PORT" "$USER@$HOST" "mkdir -p $REMOTE_DIR"
          scp -P "$PORT" release.tar.gz "$USER@$HOST:$REMOTE_DIR/"
          scp -P "$PORT" deploy/release.sh "$USER@$HOST:$REMOTE_DIR/release.sh"
          ssh -p "$PORT" "$USER@$HOST" "
            set -e
            cd $REMOTE_DIR
            tar -xzf release.tar.gz && rm release.tar.gz
            chmod +x release.sh
            ./release.sh $SHA
          "

      - name: Smoke test (health check)
        run: |
          echo "Waiting for API..."
          for i in {1..15}; do
            sleep 2
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/healthz)
            if [ "$STATUS" = "200" ]; then
              echo "Health check OK"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying..."
          done
          echo "Health check failed after 30s"
          exit 1
